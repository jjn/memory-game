<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frozen Memory Game ❄️</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="snowflakes" aria-hidden="true">
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
  </div>

  <header>
    <h1>❄️ Frozen Memory Game ❄️</h1>
    <p class="subtitle">Find the matching pairs!</p>
  </header>

  <div class="stats">
    <span class="stat">Matches: <strong id="matches">0</strong> / <strong id="total-pairs">6</strong></span>
    <button id="restart-btn">🔄 Play Again</button>
  </div>

  <div class="game-board" id="game-board"></div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-message">
      <h2>⭐ You Did It! ⭐</h2>
      <p>You found all the matches!</p>
      <div class="win-emoji">🎉❄️⛄❄️🎉</div>
      <button id="play-again-btn">🔄 Play Again</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
